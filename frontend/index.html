<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Dev Card Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent: #238636;
            --accent-hover: #2ea043;
            --error: #f85149;
        }

        * {
            box-sizing: border-box;
            transition: all 0.2s ease-in-out;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            font-weight: 800;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #58a6ff, #bc8cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subheading {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 2rem;
            background: var(--card-bg);
            padding: 10px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 1rem;
            padding: 10px;
            outline: none;
        }

        button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(35, 134, 54, 0.2);
        }

        button:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(35, 134, 54, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background-color: var(--text-secondary);
            cursor: not-allowed;
            transform: none;
        }

        /* Skeleton Loading */
        .skeleton {
            display: none;
            width: 550px;
            height: 250px;
            background: var(--card-bg);
            border-radius: 12px;
            margin: 0 auto;
            padding: 24px;
            border: 1px solid var(--border-color);
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .skeleton-circle { width: 80px; height: 80px; border-radius: 50%; background: var(--border-color); margin-bottom: 20px; }
        .skeleton-line { width: 100%; height: 20px; background: var(--border-color); border-radius: 4px; margin-bottom: 12px; }
        .skeleton-line.short { width: 60%; }

        /* Result Area */
        #result {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transform: translateY(20px);
        }

        #result.show {
            opacity: 1;
            transform: translateY(0);
        }

        .share-btn {
            margin-top: 1.5rem;
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            display: none;
        }

        .share-btn:hover {
            background-color: var(--card-bg);
            color: var(--text-primary);
            border-color: var(--text-secondary);
        }

        .error-msg {
            color: var(--error);
            background: rgba(248, 81, 73, 0.1);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--error);
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>GitHub Dev Card Generator</h1>
        <p class="subheading">Enter any public GitHub username to generate your persona.</p>

        <div class="input-group">
            <input type="text" id="username" placeholder="e.g. torvalds" spellcheck="false">
            <button id="generate-btn">Generate Card</button>
        </div>

        <div class="error-msg" id="error"></div>

        <div class="skeleton" id="skeleton">
            <div style="display: flex; gap: 24px;">
                <div style="flex: 1; display: flex; flex-direction: column; align-items: center;">
                    <div class="skeleton-circle"></div>
                    <div class="skeleton-line"></div>
                    <div class="skeleton-line short"></div>
                </div>
                <div style="flex: 1.2;">
                    <div class="skeleton-line" style="height: 40px; margin-bottom: 24px;"></div>
                    <div class="skeleton-line"></div>
                    <div class="skeleton-line"></div>
                    <div class="skeleton-line"></div>
                </div>
            </div>
        </div>

        <div id="result">
            <div id="card-content"></div>
            <button id="share-btn" class="share-btn">🔗 Copy Shareable Card URL</button>
        </div>
    </div>

    <script>
        const generateBtn = document.getElementById('generate-btn');
        const usernameInput = document.getElementById('username');
        const skeleton = document.getElementById('skeleton');
        const result = document.getElementById('result');
        const cardContent = document.getElementById('card-content');
        const shareBtn = document.getElementById('share-btn');
        const errorDiv = document.getElementById('error');

        let currentCardUrl = '';

        async function generateCard() {
            const username = usernameInput.value.trim();
            if (!username) return;

            // Reset UI
            errorDiv.style.display = 'none';
            result.classList.remove('show');
            shareBtn.style.display = 'none';
            skeleton.style.display = 'block';
            generateBtn.disabled = true;
            generateBtn.innerText = 'Analyzing...';

            try {
                // BACKEND_URL is replaced by Nginx envsubst at container start
                const response = await fetch('${BACKEND_URL}/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username })
                });

                const data = await response.json();

                if (response.ok && data.status === 'success') {
                    cardContent.innerHTML = data.card_html;
                    
                    // Construct the absolute URL for sharing
                    currentCardUrl = `${BACKEND_URL}/card/${data.username}`;
                    
                    // Show result with animation
                    setTimeout(() => {
                        skeleton.style.display = 'none';
                        result.classList.add('show');
                        shareBtn.style.display = 'block';
                    }, 500);
                } else {
                    throw new Error(data.detail || data.message || 'Failed to generate card');
                }
            } catch (err) {
                skeleton.style.display = 'none';
                errorDiv.innerText = `Error: ${err.message}`;
                errorDiv.style.display = 'block';
            } finally {
                generateBtn.disabled = false;
                generateBtn.innerText = 'Generate Card';
            }
        }

        generateBtn.addEventListener('click', generateCard);

        usernameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') generateCard();
        });

        shareBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(currentCardUrl);
            shareBtn.innerText = '✅ URL Copied!';
            setTimeout(() => {
                shareBtn.innerText = '🔗 Copy Shareable Card URL';
            }, 2000);
        });
    </script>
</body>
</html>
